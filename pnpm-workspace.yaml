# pnpm 10+ reads `overrides` from pnpm-workspace.yaml, NOT from package.json's
# `pnpm` field (silently ignored there). These pin freshly-disclosed-CVE
# transitive dependencies to their patched floors:
#   - undici >=7.28.0           — TLS cert-validation bypass + WebSocket DoS +
#                                 cross-origin routing (via @vitest/coverage-v8
#                                 > vitest > jsdom > undici); kept on the 7.x
#                                 line jsdom expects.
#   - brace-expansion >=5.0.6   — ReDoS via large numeric range (via eslint).
# Re-evaluate when jsdom / eslint bump these transitive deps past the floors,
# at which point the override becomes inert and can be removed.
overrides:
  "undici@>=7.0.0 <7.28.0": "^7.28.0"
  "brace-expansion@>=5.0.0 <5.0.6": "^5.0.6"

# pnpm 11 REMOVED `ignoredBuiltDependencies`/`onlyBuiltDependencies` (the old
# package.json `pnpm` array form) and replaced them with this `allowBuilds`
# map. esbuild ships prebuilt platform binaries via optional deps, so its
# postinstall build script is unnecessary — disallow it (matches the prior
# `ignoredBuiltDependencies: ["esbuild"]` intent) and silence the
# ERR_PNPM_IGNORED_BUILDS prompt.
allowBuilds:
  esbuild: false
