# Regenerate the committed PlantUML PNGs on a PR whose render-affecting source
# changed (the C4-PlantUML `!include` in docs/diagrams/*.puml, or PLANTUML_VERSION
# in the Makefile) — because Renovate (Mend Cloud) cannot run `make diagrams`, so a
# bump drifts the committed PNG from source and `diagrams-check` fails.
#
# This workflow renders + commits the corrected PNG back to the PR head. It does
# NOT auto-merge: `main` is gated by a Repository Ruleset, and a GITHUB_TOKEN
# commit-back push is held `action_required` (anti-recursion) — its CI does not
# run in the PR's check rollup, so the PR stays BLOCKED until a human acts.
# Finishing the merge is therefore MANUAL (by design — see /ci-workflow
# "workflow_dispatch re-trigger does NOT unblock a Repository-RULESET-gated PR"
# for why a hands-off path needs an App/PAT token, which we deliberately don't use):
#   - approve the held CI run on the PR (Actions tab -> "Approve and run"), OR
#   - locally `make diagrams && git commit && git push` (a non-bot push triggers a
#     normal CI run in the PR context, which unblocks + merges).
# The PNG regeneration itself is automated; only the final approve/merge is manual.
#
# Triggers: Renovate's own render-affecting bump PRs, OR any PR a maintainer labels
# `regen-diagrams` (the on-demand "force-regenerate" button — only write-access
# users can apply labels).
name: diagram-regen

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "docs/diagrams/**/*.puml"
      - "Makefile" # carries PLANTUML_VERSION (a bump forces a re-render via the stamp)

permissions:
  contents: write # push the regenerated PNG to the PR branch

concurrency:
  group: diagram-regen-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  regen:
    # Renovate's own bump PRs (auto-regen the PNG), OR any PR a maintainer labels
    # `regen-diagrams`. A fork PR gets a read-only GITHUB_TOKEN anyway (the push
    # would fail harmlessly), and the `labeled` path still requires the PR diff to
    # touch a diagram source (the `paths:` filter above), so labeling a
    # non-diagram PR is a no-op.
    if: >-
      github.event.pull_request.user.login == 'renovate[bot]' ||
      (github.event.action == 'labeled' && github.event.label.name == 'regen-diagrams')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      # Recursion guard: a GITHUB_TOKEN push does NOT fire `pull_request`
      # (anti-recursion), so this workflow won't re-trigger itself — but the guard
      # keeps it correct if the commit-back is ever swapped to a PAT/App token.
      # Skip when the branch tip is already our own commit.
      - id: guard
        run: |
          last_author=$(git log -1 --format='%an')
          if [ "$last_author" = "github-actions[bot]" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # `make diagrams` renders via the pinned plantuml/plantuml Docker image
      # (PLANTUML_VERSION in the Makefile) — the same renderer ci.yml uses, so
      # the output is byte-identical to what diagrams-check expects.
      - name: Regenerate diagrams
        if: steps.guard.outputs.skip != 'true'
        run: make diagrams

      - name: Detect drift
        if: steps.guard.outputs.skip != 'true'
        id: drift
        run: |
          if git diff --quiet -- docs/diagrams/out; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push regenerated PNG
        if: steps.guard.outputs.skip != 'true' && steps.drift.outputs.drift == 'true'
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/diagrams/out
          git commit -m "chore(diagrams): regenerate rendered PNGs for the bumped renderer/stdlib"
          git push origin "HEAD:${PR_HEAD_REF}"
          # NOTE: this GITHUB_TOKEN push is held `action_required` under the Ruleset
          # and does NOT run CI in the PR's rollup — so the PR stays BLOCKED. Finish
          # the merge manually: approve the held CI run, or push a local
          # `make diagrams` commit (a non-bot push runs CI in PR context). See the
          # header comment.
