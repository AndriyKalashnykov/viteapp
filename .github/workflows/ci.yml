name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # `changes` detects whether the push/PR touches code (vs docs/markdown) so
  # heavy jobs can skip on doc-only changes without using trigger-level
  # paths-ignore (which deadlocks Repository Rulesets when ci-pass is required).
  changes:
    timeout-minutes: 1
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'
              # Re-include diagram sources + rendered PNGs (otherwise excluded by
              # docs/** and **.png above) so `make diagrams-check` (in static-check)
              # runs on a .puml edit or PNG change — without this a diagram-source
              # change is classified docs-only and the drift gate is skipped.
              - 'docs/diagrams/**'

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      # mise installs the binary tools `make static-check` needs (hadolint,
      # trivy, gitleaks, container-structure-test) per .mise.toml. Without
      # this, the Makefile's mise-install is CI-guarded off and `make lint`
      # fails with `hadolint: No such file or directory`.
      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Static check
        run: make static-check

  build:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build

  test:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: make install

      - name: Coverage check
        run: make coverage-check

  e2e:
    needs: [build, test]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: E2E tests
        # `make e2e` self-contains the build (depends on `image-build`), so no
        # download-artifact fallback is needed for act-runner parity.
        run: make e2e

  e2e-browser:
    needs: [build, test]
    # Skipped under act: the Playwright browser download + Docker-in-Docker is
    # heavy and `actions/upload-artifact@v7` fails on act's v4-protocol server.
    # `make ci-run` does NOT exercise this job — run `make e2e-browser` locally.
    if: ${{ vars.ACT != 'true' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install dependencies
        run: make install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # Keyed on the lockfile so a @playwright/test bump re-downloads the
          # matching browser build; otherwise the ~115 MB Chromium download is
          # skipped on every run.
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browser)
        # System apt libs live outside the cached browser dir, so install them
        # even on a cache hit (fast — no browser download).
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Browser e2e (Playwright)
        run: make e2e-browser

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        # Diagnostic artifact, not a gate — a transient artifact-service 403/5xx
        # on upload must not red an otherwise-green run.
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    needs: [build, test]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless OIDC (only used on tag push)

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Gate 1: build single-arch image locally for scanning + smoke test + CST.
      #
      # no-cache-filters: the `server` stage runs `apk upgrade`, whose cache key
      # is (command string + parent layer digest). The parent is a PINNED digest,
      # so neither input encodes the Alpine package index — the layer stays
      # cache-valid forever while the index moves daily. Without this filter the
      # security patch step is REPLAYED, never executed, and the image ships the
      # base's unpatched packages behind a green build. Measured 2026-07-20: the
      # layer logged `#14 CACHED` while Trivy reported 8 fixable HIGHs.
      # It must be set on EVERY build that imports this cache (here, the push
      # build below, and the dast job) — filtering only the scanned build would
      # decouple scan-image from push-image in the dangerous direction.
      # `server` must match the Dockerfile's final stage name; a stale value
      # fails OPEN (silently no-ops), so `make check-dockerfile-stage` asserts it.
      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: viteapp:scan
          no-cache-filters: server
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate 2: Trivy image scan — blocks on CRITICAL/HIGH.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: viteapp:scan
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      # Gate 2b: assert the patch step RAN, not merely that no CVE is scored.
      # Trivy is an outcome gate and its RED cannot be produced on demand (it
      # needs a scored CVE to exist); this is a mechanism gate whose RED is
      # always available, so a replayed `apk upgrade` layer fails the build
      # directly instead of waiting for the vulnerability feed to catch up.
      # It is also strictly more sensitive: it fires on package drift before
      # anyone scores a CVE against it. Neither gate subsumes the other.
      - name: Assert apk upgrade layer ran
        run: ./scripts/check-apk-upgraded.sh viteapp:scan

      # Gate 3: container-structure-test — asserts USER 101, EXPOSE 8080,
      # PID-file relocation, nginx config presence + syntax.
      # mise installs the version pinned in .mise.toml so Renovate's mise
      # manager is the single source of truth (no inline-version drift).
      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Container structure test
        run: container-structure-test test --image viteapp:scan --config container-structure-test.yaml

      # Gate 4: smoke test against nginx /internal/isalive.
      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name=viteapp-smoke -p 8080:8080 viteapp:scan
          echo "Waiting up to 30s for nginx to become healthy..."
          end=$((SECONDS + 30))
          while [ $SECONDS -lt $end ]; do
            if curl -fsS http://localhost:8080/internal/isalive >/dev/null 2>&1; then
              echo "PASS: viteapp responded on /internal/isalive"
              docker rm -f viteapp-smoke >/dev/null
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: viteapp did not become healthy within 30s"
          docker logs viteapp-smoke
          docker rm -f viteapp-smoke || true
          exit 1

      # Gate 5: multi-arch build runs on EVERY push (catches arm64 cross-compile
      # regressions before tag day). `push:` is the only tag-gated lever.
      # provenance/sbom disabled: buildkit attestations inject unknown/unknown
      # entries into the OCI index that break the GHCR "OS / Arch" UI tab.
      # Cosign keyless signing (below) provides supply-chain verification.
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          no-cache-filters: server
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate 6: scan the artifact that ACTUALLY SHIPS. Gates 1–2 scan a separate
      # single-arch build; this scans the pushed manifest by digest, so cosign
      # can only ever sign an image that passed a scan of its own bytes.
      # Runs before signing deliberately: a vulnerable push fails the job and is
      # left UNSIGNED rather than being promoted.
      # NOTE: Trivy resolves a multi-arch manifest to the runner's platform, so
      # this covers linux/amd64 only — linux/arm64 is published unscanned. That
      # gap predates this change and is tracked in CLAUDE.md's Upgrade Backlog.
      - name: Trivy scan of pushed image
        if: startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      # Post-push: cosign keyless signing.
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  dast:
    # Skip under act: ZAP runs as `docker run --network host` (Docker-in-Docker
    # that act can't reliably handle), and `actions/upload-artifact@v7` fails
    # under act's v4-protocol artifact server. Real GitHub Actions runs cleanly.
    if: ${{ vars.ACT != 'true' }}
    needs: [build, test]
    timeout-minutes: 20
    runs-on: ubuntu-latest

    env:
      ZAP_VERSION: 2.17.0

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: viteapp:dast
          # See the docker job's Gate 1 comment. This job writes `mode=max` into
          # the SAME gha cache scope, so omitting the filter here would re-seed a
          # stale `server` layer for every other job that imports it.
          no-cache-filters: server
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          set -euo pipefail
          docker run -d --name=viteapp-dast -p 8080:8080 viteapp:dast
          echo "Waiting up to 30s for nginx to become healthy..."
          end=$((SECONDS + 30))
          while [ $SECONDS -lt $end ]; do
            if curl -fsS http://localhost:8080/internal/isalive >/dev/null 2>&1; then
              echo "PASS: viteapp responded on /internal/isalive"
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: viteapp did not become healthy within 30s"
          docker logs viteapp-dast
          exit 1

      - name: Cache ZAP image
        id: cache-zap
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/zap-image.tar
          key: zap-image-${{ env.ZAP_VERSION }}-${{ runner.os }}

      - name: Load or pull ZAP image
        run: |
          set -euo pipefail
          if [ -f /tmp/zap-image.tar ]; then
            echo "Loading ZAP from cache..."
            docker load -i /tmp/zap-image.tar
          else
            echo "Pulling ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}..."
            docker pull ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}
            docker save ghcr.io/zaproxy/zaproxy:${ZAP_VERSION} -o /tmp/zap-image.tar
          fi

      # ZAP runs in fail-on-warn mode now that CSP/COEP/COOP/CORP/Cache-Control
      # headers are set in nginx.conf. Any new DAST regression blocks CI rather
      # than warns. Informational rules (e.g. 10109 Modern Web Application) are
      # listed in .zap/baseline-rules.tsv with explicit IGNORE rationale.
      - name: DAST baseline scan
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/zap-output"
          chmod 777 "${GITHUB_WORKSPACE}/zap-output"
          cp "${GITHUB_WORKSPACE}/.zap/baseline-rules.tsv" "${GITHUB_WORKSPACE}/zap-output/baseline-rules.tsv"
          docker run --rm --network host \
            -v "${GITHUB_WORKSPACE}/zap-output:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:${ZAP_VERSION} \
            zap-baseline.py \
              -t http://localhost:8080 \
              -c baseline-rules.tsv \
              -r zap-report.html \
              -J zap-report.json \
              -w zap-report.md

      - name: Tear down test container
        if: always()
        run: docker rm -f viteapp-dast 2>/dev/null || true

      - name: Upload DAST report
        if: always()
        # Diagnostic artifact, not a gate — a transient artifact-service 403/5xx
        # on upload must not red an otherwise-green run.
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: zap-output/
          retention-days: 30
          if-no-files-found: ignore

  lighthouse:
    needs: [build, test]
    # Skipped under act: needs Chrome (the ubuntu-latest runner ships
    # google-chrome; act's image does not) + Docker-in-Docker for the container,
    # and `actions/upload-artifact@v7` fails on act's v4-protocol server.
    if: ${{ vars.ACT != 'true' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Lighthouse CI (perf/a11y/best-practices/SEO budgets)
        run: make lighthouse

      - name: Upload Lighthouse report
        if: ${{ !cancelled() }}
        # Diagnostic artifact, not a gate — a transient artifact-service 403/5xx
        # on upload must not red an otherwise-green run (observed 2026-06-30:
        # the Lighthouse budgets passed but FinalizeArtifact 403'd and red'd main).
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-report
          path: .lighthouseci/
          # .lighthouseci is a hidden dir (leading dot); upload-artifact@v4+
          # excludes hidden paths by default, so without this the report upload
          # finds no files. LHCI writes its filesystem report here (lighthouserc.json).
          include-hidden-files: true
          retention-days: 7

  ci-pass:
    if: always()
    needs:
      [
        changes,
        static-check,
        build,
        test,
        e2e,
        e2e-browser,
        lighthouse,
        docker,
        dast,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Aggregate job results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more upstream jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs succeeded."
