server {
    listen       8080;
    server_name  localhost;

    # Suppress the `Server: nginx/X.Y.Z` response header (avoids leaking the
    # exact nginx version to clients/scanners). ZAP DAST baseline catches this.
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # Probe endpoints use default_type instead of add_header Content-Type so
    # the server-level security `add_header` directives still inherit here.
    # In nginx, an `add_header` at the location level shadows ALL parent
    # add_header directives — using default_type avoids that trap.
    location /internal/isalive {
        access_log off;
        default_type text/plain;
        return 200 "ALIVE\n";
    }

    location /internal/isready {
        access_log off;
        default_type text/plain;
        return 200 "READY\n";
    }
}