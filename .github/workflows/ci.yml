name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # `changes` detects whether the push/PR touches code (vs docs/markdown) so
  # heavy jobs can skip on doc-only changes without using trigger-level
  # paths-ignore (which deadlocks Repository Rulesets when ci-pass is required).
  changes:
    timeout-minutes: 1
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      # mise installs the binary tools `make static-check` needs (hadolint,
      # trivy, gitleaks, container-structure-test) per .mise.toml. Without
      # this, the Makefile's mise-install is CI-guarded off and `make lint`
      # fails with `hadolint: No such file or directory`.
      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Static check
        run: make static-check

  build:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build

  test:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: make install

      - name: Coverage check
        run: make coverage-check

  e2e:
    needs: [build, test]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: E2E tests
        # `make e2e` self-contains the build (depends on `image-build`), so no
        # download-artifact fallback is needed for act-runner parity.
        run: make e2e

  docker:
    needs: [build, test]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless OIDC (only used on tag push)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Gate 1: build single-arch image locally for scanning + smoke test + CST.
      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: viteapp:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate 2: Trivy image scan — blocks on CRITICAL/HIGH.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: viteapp:scan
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      # Gate 3: container-structure-test — asserts USER 101, EXPOSE 8080,
      # PID-file relocation, nginx config presence + syntax.
      # mise installs the version pinned in .mise.toml so Renovate's mise
      # manager is the single source of truth (no inline-version drift).
      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Container structure test
        run: container-structure-test test --image viteapp:scan --config container-structure-test.yaml

      # Gate 4: smoke test against nginx /internal/isalive.
      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name=viteapp-smoke -p 8080:8080 viteapp:scan
          echo "Waiting up to 30s for nginx to become healthy..."
          end=$((SECONDS + 30))
          while [ $SECONDS -lt $end ]; do
            if curl -fsS http://localhost:8080/internal/isalive >/dev/null 2>&1; then
              echo "PASS: viteapp responded on /internal/isalive"
              docker rm -f viteapp-smoke >/dev/null
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: viteapp did not become healthy within 30s"
          docker logs viteapp-smoke
          docker rm -f viteapp-smoke || true
          exit 1

      # Gate 5: multi-arch build runs on EVERY push (catches arm64 cross-compile
      # regressions before tag day). `push:` is the only tag-gated lever.
      # provenance/sbom disabled: buildkit attestations inject unknown/unknown
      # entries into the OCI index that break the GHCR "OS / Arch" UI tab.
      # Cosign keyless signing (below) provides supply-chain verification.
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Post-push: cosign keyless signing.
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  dast:
    # Skip under act: ZAP runs as `docker run --network host` (Docker-in-Docker
    # that act can't reliably handle), and `actions/upload-artifact@v7` fails
    # under act's v4-protocol artifact server. Real GitHub Actions runs cleanly.
    if: ${{ vars.ACT != 'true' }}
    needs: [build, test]
    timeout-minutes: 20
    runs-on: ubuntu-latest

    env:
      ZAP_VERSION: 2.17.0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: viteapp:dast
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          set -euo pipefail
          docker run -d --name=viteapp-dast -p 8080:8080 viteapp:dast
          echo "Waiting up to 30s for nginx to become healthy..."
          end=$((SECONDS + 30))
          while [ $SECONDS -lt $end ]; do
            if curl -fsS http://localhost:8080/internal/isalive >/dev/null 2>&1; then
              echo "PASS: viteapp responded on /internal/isalive"
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: viteapp did not become healthy within 30s"
          docker logs viteapp-dast
          exit 1

      - name: Cache ZAP image
        id: cache-zap
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/zap-image.tar
          key: zap-image-${{ env.ZAP_VERSION }}-${{ runner.os }}

      - name: Load or pull ZAP image
        run: |
          set -euo pipefail
          if [ -f /tmp/zap-image.tar ]; then
            echo "Loading ZAP from cache..."
            docker load -i /tmp/zap-image.tar
          else
            echo "Pulling ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}..."
            docker pull ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}
            docker save ghcr.io/zaproxy/zaproxy:${ZAP_VERSION} -o /tmp/zap-image.tar
          fi

      # ZAP runs in fail-on-warn mode now that CSP/COEP/COOP/CORP/Cache-Control
      # headers are set in nginx.conf. Any new DAST regression blocks CI rather
      # than warns. Informational rules (e.g. 10109 Modern Web Application) are
      # listed in .zap/baseline-rules.tsv with explicit IGNORE rationale.
      - name: DAST baseline scan
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/zap-output"
          chmod 777 "${GITHUB_WORKSPACE}/zap-output"
          cp "${GITHUB_WORKSPACE}/.zap/baseline-rules.tsv" "${GITHUB_WORKSPACE}/zap-output/baseline-rules.tsv"
          docker run --rm --network host \
            -v "${GITHUB_WORKSPACE}/zap-output:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:${ZAP_VERSION} \
            zap-baseline.py \
              -t http://localhost:8080 \
              -c baseline-rules.tsv \
              -r zap-report.html \
              -J zap-report.json \
              -w zap-report.md

      - name: Tear down test container
        if: always()
        run: docker rm -f viteapp-dast 2>/dev/null || true

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: zap-output/
          retention-days: 30
          if-no-files-found: ignore

  ci-pass:
    if: always()
    needs: [changes, static-check, build, test, e2e, docker, dast]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Aggregate job results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more upstream jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs succeeded."
