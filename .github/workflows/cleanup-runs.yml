name: Cleanup old workflow runs

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: cleanup-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  actions: write

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      RETAIN_DAYS: 7
      KEEP_MINIMUM: 5
    steps:
      - name: Delete old workflow runs
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d "$RETAIN_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)
          gh run list --repo "${{ github.repository }}" \
            --json databaseId,createdAt --limit 200 \
            | jq -r --arg cutoff "$CUTOFF" --argjson keep "$KEEP_MINIMUM" \
                'sort_by(.createdAt) | reverse | .[$keep:] | .[] | select(.createdAt < $cutoff) | .databaseId' \
            | xargs -r -I{} gh run delete {} --repo "${{ github.repository }}"

  cleanup-caches:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete caches from deleted branches
        run: |
          set -euo pipefail
          # List existing branches once.
          mapfile -t BRANCHES < <(gh api "repos/${{ github.repository }}/branches" --paginate --jq '.[].name')
          mapfile -t TAGS < <(gh api "repos/${{ github.repository }}/tags" --paginate --jq '.[].name')
          # Iterate caches and delete those whose ref is neither a branch nor a tag.
          gh cache list --repo "${{ github.repository }}" --limit 100 \
            --json id,ref \
            | jq -r '.[] | "\(.id) \(.ref)"' \
            | while read -r id ref; do
                # Strip refs/heads/ and refs/tags/ prefixes.
                name="${ref#refs/heads/}"
                name="${name#refs/tags/}"
                # Always keep main and tag refs.
                if [ "$name" = "main" ] || printf '%s\n' "${TAGS[@]}" | grep -qx "$name"; then
                  continue
                fi
                # Keep caches whose branch still exists.
                if printf '%s\n' "${BRANCHES[@]}" | grep -qx "$name"; then
                  continue
                fi
                echo "Deleting cache $id (orphaned ref: $ref)"
                gh cache delete "$id" --repo "${{ github.repository }}" || true
              done
