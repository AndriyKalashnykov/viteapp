overrides:
  "undici@>=7.0.0 <7.28.0": "^8.0.0"
  "brace-expansion@>=5.0.0 <5.0.6": "^5.0.6"

# pnpm 11 REMOVED `ignoredBuiltDependencies`/`onlyBuiltDependencies` (the old
# package.json `pnpm` array form) and replaced them with this `allowBuilds`
# map. esbuild ships prebuilt platform binaries via optional deps, so its
# postinstall build script is unnecessary — disallow it (matches the prior
# `ignoredBuiltDependencies: ["esbuild"]` intent) and silence the
# ERR_PNPM_IGNORED_BUILDS prompt.
allowBuilds:
  esbuild: false
