schemaVersion: "2.0.0"

# Asserts on the built viteapp Docker image. Run via `make image-cst` and
# in the CI `docker` job. Catches Dockerfile regressions that Trivy and the
# nginx smoke test cannot — non-root user, port exposure, file presence.

metadataTest:
  exposedPorts: ["8080"]
  user: "101"

fileExistenceTests:
  - name: "index.html present"
    path: "/usr/share/nginx/html/index.html"
    shouldExist: true

  - name: "nginx config installed"
    path: "/etc/nginx/conf.d/default.conf"
    shouldExist: true

  - name: "PID file relocated to /tmp (writable by UID 101)"
    path: "/run/nginx.pid"
    shouldExist: false

commandTests:
  - name: "nginx binary on PATH"
    command: "which"
    args: ["nginx"]
    expectedOutput: ["/usr/sbin/nginx"]

  - name: "nginx config syntax valid"
    command: "nginx"
    args: ["-t", "-q"]
    exitCode: 0
